<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cash.bot Setup Checklist</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080a12;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,65,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 0;
    }
    .wrap {
      position: relative; z-index: 1;
      max-width: 600px; width: 100%;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2.2em, 7vw, 3.6em);
      font-weight: 700; color: #fff;
      text-shadow: 0 0 20px rgba(0,255,65,1), 0 0 60px rgba(0,255,65,0.5);
      letter-spacing: 0.02em;
    }
    .logo span { color: #00ff41; }
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72em; color: rgba(0,255,65,0.55);
      letter-spacing: 0.18em; text-transform: uppercase;
      margin-top: -18px;
    }
    .tagline::before { content: '// '; }
    .pitch {
      font-size: clamp(1.05em, 3vw, 1.25em);
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      max-width: 480px;
    }
    .pitch strong { color: #fff; }
    .phase-strip {
      display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;
      max-width: 480px;
      opacity: 0.7;
    }
    .phase-pip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6em;
      color: rgba(0,255,65,0.5);
      background: rgba(0,255,65,0.06);
      border: 1px solid rgba(0,255,65,0.12);
      border-radius: 4px;
      padding: 3px 6px;
    }
    .wa-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      background: #00ff41; color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.9em, 2.5vw, 1em);
      font-weight: 700;
      padding: 18px 36px; border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 0 32px rgba(0,255,65,0.35);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      min-height: 56px;
      letter-spacing: 0.02em;
    }
    .wa-btn:hover {
      background: #33ff66;
      transform: translateY(-2px);
      box-shadow: 0 0 48px rgba(0,255,65,0.5);
    }
    .wa-btn:active { transform: translateY(0); }
    .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68em;
      color: rgba(0,255,65,0.35);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="logo">CASH<span>.</span>BOT</div>
      <div class="tagline">setup checklist</div>
    </div>

    <p class="pitch">
      <strong>122 phases.</strong> Every tool, every system, every step to build your AI income machine —
      downloaded to your machine, runs locally, no logins needed.
    </p>

    <div class="phase-strip" id="strips"></div>

    <a class="wa-btn" href="https://wa.me/18054533586?text=Hey%20Chase%20%E2%80%94%20I%20want%20the%20Cash.bot%20setup%20checklist." target="_blank">
      💬 Message Cash.bot on WhatsApp
    </a>

    <div class="sub">reply in minutes · get your phases instantly</div>
  </div>

  <script>
    const el = document.getElementById('strips');
    for (let i = 1; i <= 122; i++) {
      const pip = document.createElement('div');
      pip.className = 'phase-pip';
      pip.textContent = String(i).padStart(2,'0');
      el.appendChild(pip);
    }
  </script>
</body>
</html>
