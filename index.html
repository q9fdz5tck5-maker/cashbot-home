<html lang="en">
<head>

<meta name="description" content="Tell it what you want. It hands you one prompt to run in Claude — first money, your own always-on machine, a whole command center of apps. Free.">

<style>
:root{
  --gold:#f5c518; --green:#22e58a; --cyan:#00d4ff; --pink:#ff006e; --purple:#a855f7;
  --bg:#0a0a0a; --bg2:#101012; --bg3:#16161a; --bg4:#1c1c22;
  --border:#22232a; --border2:#2c2d36; --fg:#f0f2f5; --muted:#888a96; --muted2:#5a5d68;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--fg);
  font-size:clamp(15px,2.5vw,17px);line-height:1.5;
  display:flex;flex-direction:column;min-height:100dvh;
  background-image:radial-gradient(900px 500px at 80% -10%,rgba(34,229,138,.07),transparent),radial-gradient(700px 400px at 0% 0%,rgba(0,212,255,.05),transparent);
}
a{color:var(--green);text-decoration:none}
header{
  flex:0 0 auto;display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:rgba(10,10,10,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5;
}
.logo{font-family:var(--mono);font-weight:700;font-size:18px;letter-spacing:-.5px}
.logo b{color:var(--green)}
.tag{color:var(--muted);font-size:13px;margin-left:auto;text-align:right;line-height:1.3}
main{flex:1 1 auto;width:100%;max-width:860px;margin:0 auto;padding:16px 16px 0;overflow-y:auto;-webkit-overflow-scrolling:touch}
#thread{display:flex;flex-direction:column;gap:14px;padding-bottom:8px}
.msg{display:flex;gap:10px;max-width:100%}
.msg .av{flex:0 0 auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:16px;background:var(--bg4)}
.msg.user{flex-direction:row-reverse}
.bubble{padding:11px 14px;border-radius:14px;border:1px solid var(--border);background:var(--bg3);max-width:88%;overflow-wrap:anywhere}
.msg.user .bubble{background:linear-gradient(180deg,#15351f,#102a19);border-color:#1e5837;color:#eafff3}
.bubble p{margin:0 0 8px}.bubble p:last-child{margin:0}
.bubble b{color:var(--gold)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chip{
  font-family:var(--font);font-size:14px;cursor:pointer;
  background:var(--bg4);color:var(--fg);border:1px solid var(--border2);
  border-radius:999px;padding:11px 15px;min-height:44px;display:inline-flex;align-items:center;
}
.chip:hover{border-color:var(--green);color:var(--green)}
.chip.primary{background:var(--green);color:#000;border-color:var(--green);font-weight:600}
.linkcard{display:flex;align-items:center;gap:10px;margin-top:8px;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:12px}
.linkcard .ic{font-size:18px}
.linkcard .body{flex:1;min-width:0}
.linkcard .t{font-weight:600;font-size:14px}
.linkcard .d{color:var(--muted);font-size:12.5px}
.linkcard .go{flex:0 0 auto;background:var(--bg4);border:1px solid var(--border2);color:var(--green);border-radius:9px;padding:9px 13px;min-height:44px;display:inline-flex;align-items:center;font-weight:600;font-size:13px}
.linkcard .go:hover{border-color:var(--green)}
.promptcard{margin-top:10px;border:1px solid var(--border2);border-radius:12px;overflow:hidden;background:var(--bg2)}
.promptcard .ph{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg4);border-bottom:1px solid var(--border)}
.promptcard .ph .nm{font-family:var(--mono);font-size:12.5px;color:var(--muted);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.promptcard pre{margin:0;padding:12px;font-family:var(--mono);font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:230px;overflow-y:auto;color:#cdd2da}
.pbtns{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border)}
.pbtn{flex:1;cursor:pointer;font-family:var(--font);font-weight:600;font-size:13.5px;border-radius:9px;padding:11px;min-height:44px;border:1px solid var(--border2);background:var(--bg4);color:var(--fg)}
.pbtn.claude{background:var(--green);color:#000;border-color:var(--green)}
.pbtn:hover{filter:brightness(1.08)}
.composer{flex:0 0 auto;position:sticky;bottom:0;background:rgba(10,10,10,.92);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.composer .row{display:flex;gap:8px;max-width:860px;margin:0 auto}
#inp{flex:1;font-family:var(--font);font-size:16px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;color:var(--fg);padding:12px 14px;min-height:48px;resize:none;max-height:120px}
#inp:focus{outline:none;border-color:var(--green)}
#send{flex:0 0 auto;cursor:pointer;background:var(--green);color:#000;font-weight:700;border:none;border-radius:12px;padding:0 18px;min-height:48px;min-width:56px;font-family:var(--font);font-size:15px}
.restart{cursor:pointer;color:var(--muted2);font-size:12px;background:none;border:none;text-decoration:underline;margin-top:4px;align-self:flex-start}
.foot{color:var(--muted2);font-size:11.5px;text-align:center;padding:10px 16px 4px}
.foot a{color:var(--muted)}
@media (max-width:480px){.tag{display:none}.bubble{max-width:92%}}
</style>
</head>
<body>
<header>
  <div class="logo"><b>cash</b>.bot</div>
  <div class="tag">tell it what you want · it hands you the prompt · free</div>
</header>

<main><div id="thread"></div></main>

<div class="composer">
  <div class="row">
    <textarea id="inp" rows="1" placeholder="Type what you want to do… (or tap a button)"></textarea>
    <button id="send">Go</button>
  </div>
</div>
<div class="foot">Every prompt is free. You run them in your own Claude. We never see your keys. · <a href="#" data-route="human">talk to a human →</a></div>

<script>
const LIB_FILES = ['os.txt','os-earn.txt','os-build.txt','os-content.txt','os-reach.txt','os-brain.txt'];
const AFF = {
  ebay:    {ic:'🏷️', t:'eBay — sell what you already own', d:'List 5 things today. Fastest $0 → cash.', u:'https://ebay.us/vYm0wI'},
  honeygain:{ic:'🍯', t:'Honeygain — passive, runs in background', d:'Share spare bandwidth. A few bucks to start.', u:'https://join.honeygain.com/CENTRFAD3A'},
  onepay:  {ic:'🏦', t:'OnePay — banking + referral cash', d:'Set up the account that holds your first dollars.', u:'https://web.onepay.com/wlink/refer-a-friend?product=one_banking&referral_code=1Gtw8URPu'},
  kraken:  {ic:'🦑', t:'Kraken — crypto on-ramp', d:'Where the first dollars can grow.', u:'https://invite.kraken.com/JDNW/8tova4ma'},
  claude:  {ic:'🤖', t:'Claude Pro — your AI builder (~$20/mo)', d:'The engine. Claude Code runs everything for you.', u:'https://claude.ai'},
  vultr:   {ic:'🖥️', t:'Vultr — your always-on machine (~$5/mo)', d:'A cloud desktop you reach from your phone.', u:'https://www.vultr.com/?ref=9896824'},
};
const PAY = {t1:'https://www.paypal.com/paypalme/rebootbase/113', t2:'https://www.paypal.com/paypalme/rebootbase/497', f:'https://www.paypal.com/paypalme/rebootbase/2000'};

let BLOCKS = {};         // label -> body text
let BLOCKS_BY_FILE = {}; // file -> [labels]
let MSGS = [];           // persisted thread [{who, html}]
const thread = document.getElementById('thread');
const inp = document.getElementById('inp');

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

async function loadLib(){
  await Promise.all(LIB_FILES.map(async f=>{
    try{
      const r = await fetch(f,{cache:'no-store'}); if(!r.ok) return;
      const txt = await r.text();
      const re = /^--- (.+?) ---\s*$/gm; let m, idx=[];
      while((m=re.exec(txt))) idx.push({label:m[1].trim(),start:m.index,bodyStart:re.lastIndex});
      BLOCKS_BY_FILE[f]=[];
      idx.forEach((b,i)=>{
        let end = i+1<idx.length ? idx[i+1].start : txt.length;
        const tail = txt.slice(b.bodyStart,end);
        const cut = tail.search(/\n(## |={20,})/);
        const body = (cut>=0 ? tail.slice(0,cut) : tail).trim();
        if(!BLOCKS[b.label]){ BLOCKS[b.label]=body; }
        BLOCKS_BY_FILE[f].push(b.label);
      });
    }catch(e){}
  }));
}

function push(who, html, persist=true){
  const av = who==='bot' ? '🤖' : '🧑';
  const wrap = document.createElement('div');
  wrap.className = 'msg '+who;
  wrap.innerHTML = '<div class="av">'+av+'</div><div class="bubble">'+html+'</div>';
  thread.appendChild(wrap);
  if(persist){ MSGS.push({who,html}); save(); }
  scroll();
}
function scroll(){ requestAnimationFrame(()=>{ const m=document.querySelector('main'); if(m) m.scrollTop=m.scrollHeight; }); }
function save(){ try{ localStorage.setItem('cb_chat_v1', JSON.stringify(MSGS)); }catch(e){} }

function chips(list){
  return '<div class="chips">'+list.map(c=>'<button class="chip'+(c.primary?' primary':'')+'" data-route="'+c.route+'">'+esc(c.label)+'</button>').join('')+'</div>';
}
function linkcard(k){ const a=AFF[k]; if(!a)return''; return '<div class="linkcard"><div class="ic">'+a.ic+'</div><div class="body"><div class="t">'+esc(a.t)+'</div><div class="d">'+esc(a.d)+'</div></div><a class="go" href="'+a.u+'" target="_blank" rel="noopener">Open</a></div>'; }
function promptcard(label){
  if(!BLOCKS[label]) return '<div class="linkcard"><div class="body"><div class="d">Couldn\'t load "'+esc(label)+'" — pull to refresh.</div></div></div>';
  const body = BLOCKS[label];
  return '<div class="promptcard"><div class="ph"><span>📋</span><span class="nm">'+esc(label)+'</span></div><pre>'+esc(body)+'</pre><div class="pbtns"><button class="pbtn claude" data-action="claude" data-label="'+esc(label)+'">▶ Open in Claude Code</button><button class="pbtn" data-action="copy" data-label="'+esc(label)+'">Copy</button></div></div>';
}
function restartBtn(){ return '<button class="restart" data-route="restart">↺ start over</button>'; }

const GREET = ()=>{ push('bot',
  '<p>Hey — you\'re in the right place. <b>I\'m cash.bot.</b> Everything here is free.</p>'+
  '<p>Tell me where you\'re at and I\'ll hand you the exact prompt to run in Claude — one step at a time.</p>'+
  '<p><b>What do you want to do first?</b></p>'+
  chips([
    {label:'💸 Make my first money now', route:'money', primary:true},
    {label:'🖥️ Set up my always-on machine', route:'machine'},
    {label:'🏗️ Build a command center of apps', route:'build'},
    {label:'⚡ Just give me everything', route:'everything'},
  ]));
};

function route(key){
  if(key==='restart'){ MSGS=[]; thread.innerHTML=''; save(); GREET(); return; }

  if(key==='money'){
    push('bot',
      '<p>Good — you start exactly where everyone starts: <b>$0 and a phone.</b></p>'+
      '<p>Two moves. First, run the money-finder prompt below in Claude — it walks you through your fastest real cash, one honest step at a time. Second, these are the on-ramps people use to pull together the first ~$25 (you\'ll want that for your own machine next):</p>'+
      promptcard('cash.bot · prompt 0')+
      linkcard('ebay')+linkcard('honeygain')+linkcard('onepay')+linkcard('kraken')+
      '<p style="margin-top:10px">Got ~$25 together? Tap below.</p>'+
      chips([{label:'🖥️ I have $25 — set up my machine', route:'machine', primary:true},{label:'⚡ Give me everything', route:'everything'}])+
      restartBtn());
    return;
  }

  if(key==='machine'){
    push('bot',
      '<p>This is the unlock: <b>your own always-on machine</b> you drive from your phone. Two accounts — both yours, on your own keys:</p>'+
      linkcard('claude')+linkcard('vultr')+
      '<p style="margin-top:10px"><b>Then run this.</b> Paste it into Claude Code (claude.ai → Code, works right on your phone). It stands up your Vultr server + remote desktop and keeps going one step at a time. You log in with <b>your own</b> Claude account and Vultr — I never touch your keys.</p>'+
      promptcard('cash.bot · prompt 1A · runs on YOUR device')+
      promptcard('cash.bot · prompt 1B · runs ON the cloud desktop')+
      '<p style="margin-top:10px">Machine online? Build apps on it:</p>'+
      chips([{label:'🏗️ Build my command center', route:'build', primary:true},{label:'⚡ The whole chain', route:'everything'}])+
      restartBtn());
    return;
  }

  if(key==='build'){
    const buildLabels = (BLOCKS_BY_FILE['os-build.txt']||[]).concat(BLOCKS_BY_FILE['os-brain.txt']||[]);
    let cards = buildLabels.slice(0,6).map(promptcard).join('');
    if(!cards) cards = promptcard('cash.bot · prompt 2A · the offer engine');
    push('bot',
      '<p>Now you turn the machine into a <b>command center</b> — your own apps, your own brand, all on your server. Each prompt below builds one piece. Run them in order, on the machine you set up.</p>'+
      '<p>Start at the top. Each one names the next when it\'s done.</p>'+
      cards+
      chips([{label:'⚡ See the full chain', route:'everything', primary:true},{label:'🖥️ Set up the machine first', route:'machine'}])+
      restartBtn());
    return;
  }

  if(key==='everything'){
    push('bot',
      '<p>Here\'s the master key. <b>One prompt</b> — run it in Claude and it walks the entire cash.bot chain <i>with</i> you, start to finish, one step at a time. Free money first, then your machine, then the apps.</p>'+
      promptcard('cash.bot · ONE-PROMPT BOOT')+
      chips([{label:'💸 Just the money part', route:'money'},{label:'🖥️ Just the machine', route:'machine'}])+
      restartBtn());
    return;
  }

  if(key==='human'){
    push('bot',
      '<p>Every prompt\'s free — what you can actually buy is <b>me, the human behind it</b>:</p>'+
      '<div class="linkcard"><div class="ic">💬</div><div class="body"><div class="t">Tier 1 — $113 once</div><div class="d">Private WhatsApp room with me + other builders.</div></div><a class="go" href="'+PAY.t1+'" target="_blank" rel="noopener">$113</a></div>'+
      '<div class="linkcard"><div class="ic">📲</div><div class="body"><div class="t">Tier 2 — $497 once</div><div class="d">WhatsApp + a direct DM line to me.</div></div><a class="go" href="'+PAY.t2+'" target="_blank" rel="noopener">$497</a></div>'+
      '<div class="linkcard"><div class="ic">🤝</div><div class="body"><div class="t">Founders — $2,000/mo + % of sales</div><div class="d">1-on-1 calls, mentorship, and I promote your product as your partner.</div></div><a class="go" href="'+PAY.f+'" target="_blank" rel="noopener">Apply</a></div>'+
      '<p style="margin-top:10px">But you don\'t need any of it to start. Tap below.</p>'+
      chips([{label:'⚡ Give me everything (free)', route:'everything', primary:true}])+
      restartBtn());
    return;
  }

  push('bot', '<p>I can point you to the right prompt — pick one:</p>'+
    chips([
      {label:'💸 Make my first money now', route:'money', primary:true},
      {label:'🖥️ Set up my machine', route:'machine'},
      {label:'🏗️ Build apps', route:'build'},
      {label:'⚡ Everything', route:'everything'},
    ]));
}

function matchIntent(text){
  const t = text.toLowerCase();
  if(/(human|chase|call|mentor|whatsapp|\bdm\b|tier|partner|pay|buy)/.test(t)) return 'human';
  if(/(server|vultr|machine|set ?up|deploy|rdp|desktop|always|claude code|host)/.test(t)) return 'machine';
  if(/(app|build|command|center|dashboard|\bos\b|brand|tool|launch)/.test(t)) return 'build';
  if(/(everything|all|whole|chain|master|both)/.test(t)) return 'everything';
  if(/(broke|no money|zero|first|cash|money|earn|paid|afford|free money|claim|\$0|0)/.test(t)) return 'money';
  return null;
}

function handleInput(){
  const v = inp.value.trim(); if(!v) return;
  push('user', '<p>'+esc(v)+'</p>');
  inp.value=''; inp.style.height='auto';
  const k = matchIntent(v);
  setTimeout(()=>route(k||'fallback'), 160);
}

document.addEventListener('click', e=>{
  const r = e.target.closest('[data-route]');
  if(r){ e.preventDefault(); const k=r.getAttribute('data-route');
    if(k!=='restart') push('user', '<p>'+esc(r.textContent.trim())+'</p>');
    setTimeout(()=>route(k),120); return; }
  const a = e.target.closest('[data-action]');
  if(a){ const label=a.getAttribute('data-label'); const body=BLOCKS[label];
    if(!body){ alert('Still loading that prompt — give it a second and try again.'); return; }
    if(a.getAttribute('data-action')==='claude'){ window.open('https://claude.ai/code?prompt='+encodeURIComponent(body),'_blank','noopener'); }
    else { navigator.clipboard.writeText(body).then(()=>{ a.textContent='Copied ✓'; setTimeout(()=>a.textContent='Copy',1500); }); }
  }
});
document.getElementById('send').addEventListener('click', handleInput);
inp.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleInput(); }});
inp.addEventListener('input', ()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,120)+'px'; });

(async ()=>{
  await loadLib();
  try{ MSGS = JSON.parse(localStorage.getItem('cb_chat_v1')||'[]'); }catch(e){ MSGS=[]; }
  if(Array.isArray(MSGS) && MSGS.length){ MSGS.forEach(m=>push(m.who,m.html,false)); scroll(); }
  else { MSGS=[]; GREET(); }
})();
</script>
</body>
</html>
